# Doctoringo AI — Google Cloud Build pipeline
#
# Secrets are read from Google Secret Manager at build time.
# Provision them once with:
#
#   echo -n "<value>" | gcloud secrets create doctoringo-firebase-api-key --data-file=-
#   echo -n "<value>" | gcloud secrets create doctoringo-firebase-app-id  --data-file=-
#   ...
#
# Then grant the Cloud Build service account access:
#
#   gcloud secrets add-iam-policy-binding doctoringo-firebase-api-key \
#     --member="serviceAccount:${PROJECT_NUMBER}@cloudbuild.gserviceaccount.com" \
#     --role="roles/secretmanager.secretAccessor"

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/doctoringo-firebase-api-key/versions/latest
      env: VITE_FIREBASE_API_KEY
    - versionName: projects/$PROJECT_ID/secrets/doctoringo-firebase-auth-domain/versions/latest
      env: VITE_FIREBASE_AUTH_DOMAIN
    - versionName: projects/$PROJECT_ID/secrets/doctoringo-firebase-project-id/versions/latest
      env: VITE_FIREBASE_PROJECT_ID
    - versionName: projects/$PROJECT_ID/secrets/doctoringo-firebase-storage-bucket/versions/latest
      env: VITE_FIREBASE_STORAGE_BUCKET
    - versionName: projects/$PROJECT_ID/secrets/doctoringo-firebase-messaging-sender-id/versions/latest
      env: VITE_FIREBASE_MESSAGING_SENDER_ID
    - versionName: projects/$PROJECT_ID/secrets/doctoringo-firebase-app-id/versions/latest
      env: VITE_FIREBASE_APP_ID
    - versionName: projects/$PROJECT_ID/secrets/doctoringo-firebase-measurement-id/versions/latest
      env: VITE_FIREBASE_MEASUREMENT_ID
    - versionName: projects/$PROJECT_ID/secrets/doctoringo-supabase-url/versions/latest
      env: VITE_SUPABASE_URL
    - versionName: projects/$PROJECT_ID/secrets/doctoringo-supabase-anon-key/versions/latest
      env: VITE_SUPABASE_ANON_KEY
    - versionName: projects/$PROJECT_ID/secrets/doctoringo-xai-guest-key/versions/latest
      env: VITE_XAI_API_KEY

steps:
  # Build the Docker image — secrets are exposed via env vars and forwarded
  # as Docker build args inside the script.
  - name: 'gcr.io/cloud-builders/docker'
    secretEnv:
      - VITE_FIREBASE_API_KEY
      - VITE_FIREBASE_AUTH_DOMAIN
      - VITE_FIREBASE_PROJECT_ID
      - VITE_FIREBASE_STORAGE_BUCKET
      - VITE_FIREBASE_MESSAGING_SENDER_ID
      - VITE_FIREBASE_APP_ID
      - VITE_FIREBASE_MEASUREMENT_ID
      - VITE_SUPABASE_URL
      - VITE_SUPABASE_ANON_KEY
      - VITE_XAI_API_KEY
    entrypoint: bash
    args:
      - -c
      - |
        docker build \
          --build-arg VITE_FIREBASE_API_KEY="$$VITE_FIREBASE_API_KEY" \
          --build-arg VITE_FIREBASE_AUTH_DOMAIN="$$VITE_FIREBASE_AUTH_DOMAIN" \
          --build-arg VITE_FIREBASE_PROJECT_ID="$$VITE_FIREBASE_PROJECT_ID" \
          --build-arg VITE_FIREBASE_STORAGE_BUCKET="$$VITE_FIREBASE_STORAGE_BUCKET" \
          --build-arg VITE_FIREBASE_MESSAGING_SENDER_ID="$$VITE_FIREBASE_MESSAGING_SENDER_ID" \
          --build-arg VITE_FIREBASE_APP_ID="$$VITE_FIREBASE_APP_ID" \
          --build-arg VITE_FIREBASE_MEASUREMENT_ID="$$VITE_FIREBASE_MEASUREMENT_ID" \
          --build-arg VITE_SUPABASE_URL="$$VITE_SUPABASE_URL" \
          --build-arg VITE_SUPABASE_ANON_KEY="$$VITE_SUPABASE_ANON_KEY" \
          --build-arg VITE_XAI_API_KEY="$$VITE_XAI_API_KEY" \
          -t gcr.io/$PROJECT_ID/doctoringo-frontend:$BUILD_ID \
          -t gcr.io/$PROJECT_ID/doctoringo-frontend:latest \
          .
    timeout: '1200s'

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/doctoringo-frontend:latest']

  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'doctoringo-frontend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/doctoringo-frontend:latest'
      - '--region'
      - 'europe-west3'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'

timeout: 1800s
images:
  - 'gcr.io/$PROJECT_ID/doctoringo-frontend:latest'
